name: Keep Render App Alive

on:
  schedule:
    - cron: "*/13 6-23 * * *"  # every 13 min from 6 AM to 11 PM
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging at $(date -u)"
          curl -v -w "\n\nHTTP Status: %{http_code}\nTotal Time: %{time_total}s\n" \
            https://finance-data-processing-backend.onrender.com/health